version: '3.8'

services:
  braitenberg:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: braitenberg_robot:latest
    environment:
      - DISPLAY=${DISPLAY}
      - TURTLEBOT3_MODEL=waffle
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    command: bash
